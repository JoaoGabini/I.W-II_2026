<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom&Jerry</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <div class="container">
        <div class="main-cartoon">
            <div class="elemento-cartoon">
                <h1>Cadastro de Usuário</h1>
                <img src="img/tomejerry.png" alt="Tom&Jerry" class="tom-cartoon">
            </div>
            <div class="form-cartoon">
                <input type="text" id="nome" placeholder="Insira o seu nome" class="box-cartoon">
                <input type="text" id="login" placeholder="Crie seu login" class="box-cartoon">
                <input type="text" id="senha" placeholder="Crie sua senha" class="box-cartoon">
                <input type="text" id="email" placeholder="Insira seu email" class="box-cartoon">

                <div class="btn-cartoon">
                    <button class="botao-cartoon">Cadastrar</button>
                    <button class="botao-cartoon">Sair</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
